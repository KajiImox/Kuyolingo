  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kuyolingo</title>
    <!-- Tailwind CSS for beautiful styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for cartoon icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Fredoka and Inter for a friendly, readable classroom look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Fredoka', 'Inter', sans-serif;
            background-color: #f1f5f9;
            overflow: hidden; /* Lock the page body completely from scrolling */
            height: 100vh;
            height: 100dvh;
        }
        /* Tactile Duolingo style 3D buttons */
        .btn-3d {
            transition: all 0.1s ease;
            transform: translateY(-4px);
        }
        .btn-3d:active {
            transform: translateY(0px);
            border-bottom-width: 0px !important;
        }
        /* Hide native scrollbar handles inside our locked views */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Slide Up animation for feedback drawer (Mobile) */
        @keyframes slideUp {
            0% {
                transform: translateY(100%);
            }
            100% {
                transform: translateY(0);
            }
        }
        .slide-up {
            animation: slideUp 0.38s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Slide Left animation for feedback drawer (Desktop) */
        @keyframes slideLeft {
            0% {
                transform: translateX(100%);
            }
            100% {
                transform: translateX(0);
            }
        }
        @media (min-width: 768px) {
            .md\:slide-left {
                animation: slideLeft 0.38s cubic-bezier(0.16, 1, 0.3, 1) forwards !important;
            }
        }
    </style>
</head>
<body class="flex flex-col justify-center items-center selection:bg-indigo-100 w-full">

    <!-- MAIN GAME FRAME -->
    <div id="app" class="flex flex-col max-w-lg md:max-w-4xl w-full bg-white shadow-2xl relative overflow-hidden h-[100dvh] md:h-[92vh] md:max-h-[680px] md:rounded-3xl border border-slate-200 transition-all duration-300">
        
        <!-- CANVAS CELEBRATION OVERLAY -->
        <canvas id="celebrationCanvas" class="absolute inset-0 pointer-events-none z-50 w-full h-full"></canvas>

        <!-- HEADER BAR -->
        <header class="border-b-2 border-slate-100 px-6 py-4 flex items-center justify-between bg-white z-10 shrink-0">
            <div class="flex items-center gap-2.5 cursor-pointer" onclick="gameEngine.goToDashboard()">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white text-lg shadow-md border-b-4 border-indigo-800">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <div>
                    <!-- Dynamic Classroom Title loaded from config -->
                    <h1 id="header-class-title" class="text-lg font-bold text-slate-800 leading-none">Kuyolingo</h1>
                    <span class="text-[10px] text-indigo-600 font-semibold uppercase tracking-wider">A game by @arqueomayagt</span>
                </div>
            </div>

            <!-- BILINGUAL LANGUAGE SWAP BUTTON -->
            <div>
                <button id="lang-toggle-btn" onclick="gameEngine.toggleLanguage()" class="btn-3d bg-slate-100 hover:bg-slate-150 border-b-4 border border-slate-200/80 px-4 py-2 rounded-xl text-xs font-bold transition-all flex items-center gap-1.5 shadow-sm active:translate-y-0 active:border-b-0">
                    <span id="lang-label" class="text-slate-700 font-bold">English</span>
                </button>
            </div>
        </header>

        <!-- SCREEN: DASHBOARD -->

            <!-- SECCIÓN IZQUIERDA (Mascota e Instrucción) -->
            <div class="text-center py-2 shrink-0 md:w-5/12 md:flex md:flex-col md:justify-center md:items-center">
                <div class="text-6xl md:text-8xl mb-3 animate-bounce">🦉</div>
                <h2 class="text-2xl md:text-3xl font-extrabold text-slate-800">Choose a Lesson!</h2>
                <p class="text-slate-500 text-sm md:text-base mt-0.5">Select a topic below, then press Start to begin.</p>
            </div>

            <!-- SECCIÓN DERECHA (Grilla de Lecciones y Acción) -->
            <div class="flex-grow flex flex-col justify-between overflow-hidden md:w-7/12">
                <!-- LESSON CARD SELECTOR GRID -->
                <div id="lessons-grid" class="flex-grow flex flex-col gap-3 py-1 overflow-y-auto no-scrollbar">
                    <!-- Dynamic Lesson buttons injected here -->
                </div>

                <!-- DASHBOARD ACTION BAR -->
                <div id="dashboard-action-bar" class="mt-4 shrink-0">
                    <button id="start-lesson-btn" disabled onclick="gameEngine.confirmStartLesson()" class="btn-3d w-full bg-slate-200 text-slate-400 border-b-4 border-slate-300 cursor-not-allowed py-4 rounded-2xl font-extrabold shadow-md text-center text-sm select-none transition-all">
                        Start Lesson
                    </button>
                </div>
            </div>
        </div>

        <!-- SCREEN: GAMEPLAY -->
        <div id="screen-game" class="hidden flex-grow flex flex-col justify-between p-5 overflow-hidden relative">
            <!-- GAME STATUS HEADER -->
            <div class="flex items-center justify-between gap-4 mb-3 shrink-0">
                <!-- Quit Button -->
                <button onclick="gameEngine.quitGame()" class="text-slate-400 hover:text-slate-600 transition-colors">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
                
                <!-- Progress Bar -->
                <div class="flex-grow bg-slate-100 h-3.5 rounded-full overflow-hidden border border-slate-200/50">
                    <div id="game-progress" class="bg-indigo-500 h-full rounded-full transition-all duration-300" style="width: 0%;"></div>
                </div>

                <!-- Lives Indicator -->
                <div class="flex items-center gap-1 font-bold text-rose-500" id="lives-container">
                    <!-- Hearts generated dynamically -->
                </div>
            </div>

            <!-- QUESTION CONTAINER (Split into Left/Right adaptive columns) -->
            <div class="flex-grow flex flex-col md:flex-row gap-6 md:gap-8 overflow-hidden py-1 items-stretch" id="game-question-area">
                <!-- Columna Izquierda: Pregunta e Imagen principal -->
                <div id="game-left-col" class="flex flex-col justify-center items-center w-full md:w-1/2 text-center shrink-0"></div>
                <!-- Columna Derecha: Opciones e Interacciones -->
                <div id="game-right-col" class="flex flex-col justify-center items-center w-full md:w-1/2"></div>
            </div>

            <!-- ANSWER BANNER (Appears after checking - Slides up on mobile, and slides horizontally on desktop to cover the right side options) -->

                </div>

            <!-- CHECK ACTION BAR (Before answering - Hides to invisible to lock page layout strictly) -->
            <div id="action-banner" class="mt-4 flex gap-3 shrink-0">

            </div>

            <!-- STATS BOARD (Updated to a clean 3-column grid featuring XP Points) -->
            <div class="grid grid-cols-3 gap-2.5 w-full max-w-sm mb-6 shrink-0">

                <div class="bg-emerald-50 border-2 border-emerald-100 rounded-xl p-2.5 flex flex-col items-center justify-center">

                    <span id="results-score" class="text-base md:text-lg font-black text-emerald-600">0/10</span>
                </div>
                <!-- Column 2: Hearts -->

                    <span id="results-xp" class="text-base md:text-lg font-black text-amber-600">0 XP</span>

            </div>

            <!-- ACTION BUTTONS -->
            <div class="w-full max-w-xs shrink-0">

            </div>
        </div>

        <div id="custom-dialog" class="hidden absolute inset-0 bg-slate-900/85 backdrop-blur-sm z-[100] flex items-center justify-center p-6">

                <div id="dialog-actions" class="flex gap-3 mt-5">
                    <!-- Dynamically generated action button -->
                </div>
            </div>
        </div>

    </div>

        function cleanGoogleDriveUrl(url) {
            if (!url) return 'https://placehold.co/150x150/f1f5f9/475569?text=🖼️';
            
            const driveStr = url.trim();
            if (driveStr.includes('drive.google.com')) {
                const matches = driveStr.match(/\/file\/d\/([^\/]+)/) || driveStr.match(/id=([^&]+)/);
                if (matches && matches[1]) {
                    return `https://lh3.googleusercontent.com/d/${matches[1]}`;
                }
            }
            return driveStr;

        /* ==========================================
           2. SOUND SYNTHESIS SYSTEM (Classroom Safe!)
           ========================================== */
        const playSound = (type) => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                
                if (type === 'success') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, ctx.currentTime); 
                    osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.08); 
                    osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.16); 
                    osc.frequency.setValueAtTime(1046.50, ctx.currentTime + 0.24); 
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.45);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.45);
                } else if (type === 'error') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(150, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(95, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.2);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.2);
                } else if (type === 'click') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(450, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(580, ctx.currentTime + 0.04);
                    gain.gain.setValueAtTime(0.08, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.04);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.04);
                }
            } catch (err) {
                console.warn("Web audio context blocked by browser security context.", err);
            }
        };

        /* ==========================================
           4. CANVAS PARTICLE ENGINE
           ========================================== */
        const canvas = document.getElementById('celebrationCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationFrameId = null;

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 5 + 3;
                this.color = `hsl(${Math.random() * 360}, 90%, 65%)`; 
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = Math.random() * -8 - 5;
                this.gravity = 0.25;
                this.alpha = 1;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.15;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size, -this.size / 2, this.size * 2, this.size);
                ctx.restore();
            }
            update() {
                this.x += this.vx;
                this.vy += this.gravity;
                this.y += this.vy;
                this.rotation += this.rotationSpeed;
                this.alpha -= 0.018;
            }
        }

        function triggerConfetti() {
            resizeCanvas();
            for (let i = 0; i < 30; i++) {
                particles.push(new Particle(30, canvas.height - 30));
                particles.push(new Particle(canvas.width - 30, canvas.height - 30));
            }
            if (!animationFrameId) {
                animateParticles();
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => p.alpha > 0);
            
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            if (particles.length > 0) {
                animationFrameId = requestAnimationFrame(animateParticles);
            } else {
                animationFrameId = null;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }

        window.addEventListener('resize', resizeCanvas);

                    const isLocked = l.locked && !INSTRUCTOR_CONFIG.settings.unlockAllLessons;
                    if (el && !isLocked) {
                        el.className = "flex items-center gap-4 bg-white hover:bg-slate-50 border-2 border-slate-200 hover:border-indigo-400 p-4 rounded-2xl cursor-pointer transition-all select-none shadow-sm shrink-0";
                    }
                });

                this.selectedLesson = lesson;
                const activeCard = document.getElementById(`lesson-card-${lesson.id}`);
                if (activeCard) {
                    activeCard.className = "flex items-center gap-4 bg-indigo-50/50 border-4 border-indigo-500 p-3.5 rounded-2xl cursor-pointer transition-all select-none shadow-md shrink-0";
                }

                const startBtn = document.getElementById('start-lesson-btn');
                startBtn.disabled = false;
                startBtn.className = "btn-3d w-full bg-emerald-500 border-b-4 border-emerald-700 text-white cursor-pointer py-4 rounded-2xl font-extrabold shadow-md text-center text-sm select-none transition-all";
            },

            confirmStartLesson() {
                if (!this.selectedLesson) return;
                
                const cardsCount = this.selectedLesson.cards.length;
                const optCount = INSTRUCTOR_CONFIG.settings.optionsCount;
                if (cardsCount < optCount) {
                    const strings = TRANSLATIONS[this.currentLanguage];
                    const errMsg = strings.needMoreCardsMsg
                        .replace("{count}", cardsCount)
                        .replace("{options}", optCount);
                    ui.alert(
                        errMsg,
                        strings.needMoreCardsTitle,
                        "⚙️"
                    );
                    return;
                }

                playSound('click');
                this.currentIndex = 0;
                this.lives = 3;
                this.score = 0;
                
                this.questions = this.buildSessionQuestions(
                    this.selectedLesson.cards, 
                    INSTRUCTOR_CONFIG.settings.questionsPerSession
                );

                document.getElementById('screen-dashboard').classList.add('hidden');
                document.getElementById('screen-game').classList.remove('hidden');
                this.loadQuestion();
            },

            restartGame() {
                this.confirmStartLesson();
            },

            buildSessionQuestions(cards, maxSessionCount) {
                const questions = [];
                const possibleTypes = [];
                
                if (INSTRUCTOR_CONFIG.settings.allowFindImageQuestion) possibleTypes.push('FIND_IMAGE');
                if (INSTRUCTOR_CONFIG.settings.allowNameImageQuestion) possibleTypes.push('NAME_IMAGE');

                if (possibleTypes.length === 0) possibleTypes.push('NAME_IMAGE');

                // Shuffle deck first to ensure random draw of unique cards
                const shuffledCards = [...cards].sort(() => Math.random() - 0.5);
                
                // Limit the session to the actual size of the deck or max count
                // This guarantees we never test the same card twice in a single run!
                const totalQuestionsToBuildActual = Math.min(maxSessionCount, shuffledCards.length);

                for (let i = 0; i < totalQuestionsToBuildActual; i++) {
                    const card = shuffledCards[i];
                    // Randomly choose question style for this card
                    const chosenType = possibleTypes[Math.floor(Math.random() * possibleTypes.length)];
                    
                    const options = [card];
                    const incorrects = cards.filter(c => c.word !== card.word).sort(() => Math.random() - 0.5);
                    
                    const neededIncorrects = INSTRUCTOR_CONFIG.settings.optionsCount - 1;
                    for (let j = 0; j < Math.min(neededIncorrects, incorrects.length); j++) {
                        options.push(incorrects[j]);
                    }

                    options.sort(() => Math.random() - 0.5);

                    questions.push({
                        type: chosenType,
                        target: card,
                        options: options
                    });
                }

                // Shuffle final game questions order so game modes are randomized
                return questions.sort(() => Math.random() - 0.5);
            },

            loadQuestion() {
                this.selectedOptionIndex = null;
                const strings = TRANSLATIONS[this.currentLanguage];

                const checkBtn = document.getElementById('check-btn');
                checkBtn.disabled = true;
                checkBtn.innerText = strings.checkAnswer;
                checkBtn.className = "btn-3d w-full bg-slate-200 text-slate-400 border-b-4 border-slate-300 cursor-not-allowed py-3.5 rounded-xl font-extrabold shadow-md text-center text-sm select-none animate-all";
                
                const banner = document.getElementById('feedback-banner');
                banner.classList.add('hidden');
                banner.classList.remove('slide-up');

                document.getElementById('action-banner').classList.remove('invisible');

                const livesDiv = document.getElementById('lives-container');
                livesDiv.innerHTML = '';
                for (let i = 0; i < 3; i++) {
                    const heart = document.createElement('i');
                    heart.className = i < this.lives ? "fa-solid fa-heart text-rose-500 text-lg animate-bounce" : "fa-regular fa-heart text-slate-300 text-lg";
                    livesDiv.appendChild(heart);
                }

                const progressPercent = (this.currentIndex / this.questions.length) * 100;
                document.getElementById('game-progress').style.width = `${progressPercent}%`;

                // Clears the left and right adaptive columns
                const leftCol = document.getElementById('game-left-col');
                const rightCol = document.getElementById('game-right-col');
                leftCol.innerHTML = '';
                rightCol.innerHTML = '';

                const q = this.questions[this.currentIndex];

                if (q.type === 'FIND_IMAGE') {
                    // LEFT COLUMN (Header question details)
                    const header = document.createElement('div');
                    header.className = "my-auto flex flex-col items-center justify-center p-4";
                    
                    // Question splitted cleanly into two lines on desktop, without icons
                    header.innerHTML = `
                        <h3 class="text-2xl md:text-3xl font-black text-slate-800 leading-tight">
                            <span class="md:block md:mb-2">${strings.whichRepresents}</span>
                            <span>
                                <span class="text-indigo-600 underline decoration-indigo-300 decoration-wavy decoration-2">"${this.getLocalizedWord(q.target)}"</span>?
                            </span>
                        </h3>
                    `;
                    leftCol.appendChild(header);

                    // RIGHT COLUMN (Perfectly squared options container)
                    const grid = document.createElement('div');
                    grid.className = "grid grid-cols-2 gap-3.5 max-w-[280px] sm:max-w-[320px] mx-auto w-full flex-grow my-auto items-center justify-center aspect-square shrink-0";
                    
                    q.options.forEach((opt, idx) => {
                        const cell = document.createElement('div');
                        cell.id = `opt-${idx}`;
                        cell.onclick = () => this.selectOption(idx);
                        cell.className = "border-4 border-slate-200 rounded-[24px] bg-white p-0 flex items-center justify-center aspect-square shadow-md cursor-pointer hover:border-indigo-400 transition-all duration-100 select-none overflow-hidden relative w-full";
                        
                        const directImg = cleanGoogleDriveUrl(opt.imageUrl);
                        cell.innerHTML = `
                            <img src="${directImg}" class="w-full h-full object-contain rounded-2xl bg-white" onerror="this.src='https://placehold.co/200x200/f1f5f9/475569?text=${this.getLocalizedWord(opt)}'"/>
                        `;
                        grid.appendChild(cell);
                    });

                    rightCol.appendChild(grid);

                } else {
                    // LEFT COLUMN (Header question title + Central adaptive square image container)
                    const headerContainer = document.createElement('div');
                    headerContainer.className = "w-full flex flex-col justify-center items-center my-auto";
                    headerContainer.innerHTML = `
                        <h3 class="text-2xl md:text-3xl font-black text-slate-800 leading-tight mb-3 shrink-0">${strings.whatIsThis}</h3>
                    `;
                    
                    const previewBox = document.createElement('div');
                    previewBox.className = "w-52 h-52 md:w-60 md:h-60 mx-auto bg-white border-4 border-indigo-100 rounded-[32px] overflow-hidden flex items-center justify-center shadow-lg relative aspect-square max-h-[190px] md:max-h-[250px] shrink transition-transform hover:scale-[1.02] mb-1";
                    
                    const directImg = cleanGoogleDriveUrl(q.target.imageUrl);
                    previewBox.innerHTML = `
                        <img src="${directImg}" class="w-full h-full object-contain bg-white rounded-[28px]" onerror="this.src='https://placehold.co/250x250/f1f5f9/475569?text=${this.getLocalizedWord(q.target)}'"/>
                    `;
                    headerContainer.appendChild(previewBox);
                    leftCol.appendChild(headerContainer);

                    // RIGHT COLUMN (Centered 2x2 multi-choice buttons)
                    const list = document.createElement('div');
                    list.className = "grid grid-cols-2 gap-3 max-w-md mx-auto w-full my-auto shrink-0";

                    q.options.forEach((opt, idx) => {
                        const btn = document.createElement('button');
                        btn.id = `opt-${idx}`;
                        btn.onclick = () => this.selectOption(idx);
                        btn.className = "w-full text-left bg-white border-2 border-slate-200 border-b-4 hover:bg-slate-50 py-3.5 px-4 rounded-2xl font-bold text-slate-700 flex items-center gap-2.5 transition-all select-none text-sm md:text-base";
                        btn.innerHTML = `
                            <span class="w-6 h-6 rounded-full bg-slate-100 flex items-center justify-center text-xs text-slate-400 font-black border border-slate-200 shrink-0">${idx + 1}</span>
                            <span class="truncate">${this.getLocalizedWord(opt)}</span>
                        `;
                        list.appendChild(btn);
                    });

                    rightCol.appendChild(list);
                }
            },

            selectOption(idx) {
                playSound('click');
                const q = this.questions[this.currentIndex];
                const strings = TRANSLATIONS[this.currentLanguage];
                
                q.options.forEach((_, optIdx) => {
                    const el = document.getElementById(`opt-${optIdx}`);
                    if (!el) return;
                    if (q.type === 'FIND_IMAGE') {
                        el.className = "border-4 border-slate-200 rounded-[24px] bg-white p-0 flex items-center justify-center aspect-square shadow-md cursor-pointer hover:border-indigo-400 transition-all duration-100 select-none overflow-hidden relative w-full";
                    } else {
                        el.className = "w-full text-left bg-white border-2 border-slate-200 border-b-4 hover:bg-slate-50 py-3.5 px-4 rounded-2xl font-bold text-slate-700 flex items-center gap-2.5 transition-all select-none text-sm md:text-base";
                    }
                });

                this.selectedOptionIndex = idx;
                const activeEl = document.getElementById(`opt-${idx}`);
                
                if (q.type === 'FIND_IMAGE') {
                    activeEl.className = "border-4 border-indigo-600 rounded-[24px] bg-indigo-50 flex items-center justify-center aspect-square shadow-lg cursor-pointer transition-all duration-100 select-none overflow-hidden relative w-full";
                } else {
                    activeEl.className = "w-full text-left bg-indigo-50 border-4 border-indigo-500 hover:bg-indigo-50 py-3 px-4 rounded-2xl font-bold text-indigo-800 flex items-center gap-2.5 transition-all select-none text-sm md:text-base";
                }

                const checkBtn = document.getElementById('check-btn');
                checkBtn.disabled = false;
                checkBtn.innerText = strings.checkAnswer;
                checkBtn.className = "btn-3d w-full bg-emerald-500 border-b-4 border-emerald-700 text-white cursor-pointer py-3.5 rounded-xl font-extrabold shadow-md text-center text-sm select-none transition-all";
            },

            checkAnswer() {
                const q = this.questions[this.currentIndex];
                const selectedWord = this.getLocalizedWord(q.options[this.selectedOptionIndex]);
                const correctWord = this.getLocalizedWord(q.target);
                const isCorrect = (selectedWord === correctWord);

                const strings = TRANSLATIONS[this.currentLanguage];
                
                // Hide the regular action button to invisible (keeps layout spacing frozen)
                document.getElementById('action-banner').classList.add('invisible');

                const banner = document.getElementById('feedback-banner');
                const icon = document.getElementById('feedback-icon');
                const title = document.getElementById('feedback-title');
                const desc = document.getElementById('feedback-desc');
                const btn = document.getElementById('feedback-btn');

                banner.classList.remove('hidden');

                if (isCorrect) {
                    this.score++;
                    playSound('success');
                    triggerConfetti();

                    // Apply overlayed absolute layout styling + slide-up on mobile, slide-left on desktop
                    banner.className = "absolute inset-x-0 bottom-0 h-[58%] md:h-full md:w-1/2 md:left-auto md:right-0 md:rounded-l-[36px] md:rounded-r-none p-6 flex flex-col justify-between gap-4 z-30 shadow-[0_-15px_50px_rgba(16,185,129,0.22)] md:shadow-[-15px_0_50px_rgba(16,185,129,0.22)] border-t-4 md:border-t-0 md:border-l-4 bg-emerald-100 border-emerald-300 md:border-emerald-350 text-emerald-900 slide-up md:slide-left";
                    icon.className = "w-20 h-20 bg-emerald-500 text-white rounded-full flex items-center justify-center text-3xl shadow-lg shrink-0 mx-auto animate-bounce";
                    icon.innerHTML = '<i class="fa-solid fa-circle-check"></i>';
                    
                    title.innerText = strings.fantasticWork;
                    desc.innerText = `${strings.youIdentified} "${correctWord}"!`;
                    
                    btn.innerText = strings.continue;
                    btn.className = "btn-3d w-full bg-emerald-500 border-b-4 border-emerald-700 text-white py-4 rounded-2xl font-extrabold shadow-md text-center text-base transition-all shrink-0";
                    btn.onclick = () => this.advanceQuestion();
                } else {
                    this.lives--;
                    playSound('error');

                    // Apply overlayed absolute layout styling + slide-up on mobile, slide-left on desktop
                    banner.className = "absolute inset-x-0 bottom-0 h-[58%] md:h-full md:w-1/2 md:left-auto md:right-0 md:rounded-l-[36px] md:rounded-r-none p-6 flex flex-col justify-between gap-4 z-30 shadow-[0_-15px_50px_rgba(244,63,94,0.22)] md:shadow-[-15px_0_50px_rgba(244,63,94,0.22)] border-t-4 md:border-t-0 md:border-l-4 bg-rose-100 border-rose-300 md:border-rose-350 text-rose-900 slide-up md:slide-left";
                    icon.className = "w-20 h-20 bg-rose-500 text-white rounded-full flex items-center justify-center text-3xl shadow-lg shrink-0 mx-auto";
                    icon.innerHTML = '<i class="fa-solid fa-circle-xmark"></i>';
                    
                    title.innerText = strings.notQuite;
                    desc.innerText = `${strings.correctTerm} "${correctWord}".`;

                    btn.innerText = strings.continue;
                    btn.className = "btn-3d w-full bg-rose-500 border-b-4 border-rose-700 text-white py-4 rounded-2xl font-extrabold shadow-md text-center text-base transition-all shrink-0";
                    btn.onclick = () => this.advanceQuestion();
                }
            },

            advanceQuestion() {
                playSound('click');
                this.currentIndex++;

                if (this.lives <= 0) {
                    this.finishGame(false);
                } else if (this.currentIndex >= this.questions.length) {
                    this.finishGame(true);
                } else {
                    this.loadQuestion();
                }
            },

            finishGame(isSuccess) {
                document.getElementById('screen-game').classList.add('hidden');
                document.getElementById('screen-results').classList.remove('hidden');

                const mascot = document.getElementById('results-mascot');
                const scoreText = document.getElementById('results-score');
                const heartsText = document.getElementById('results-hearts');
                const xpText = document.getElementById('results-xp');
                const badge = document.getElementById('perfect-badge');

                scoreText.innerText = `${this.score}/${this.questions.length}`;
                
                let heartsLeftStr = '';
                for (let i = 0; i < 3; i++) {
                    heartsLeftStr += i < this.lives ? '❤️' : '🖤';
                }
                heartsText.innerText = heartsLeftStr;

                const isPass = this.score >= (this.questions.length / 2);
                if (isPass) {
                    mascot.innerText = "🦉🎉";
                } else {
                    mascot.innerText = "🦉🩹";
                }

                this.updateResultsLanguage();

                // DYNAMIC XP POINT CALCULATIONS
                let baseXp = this.score * 10;
                let perfectBonus = 0;
                
                // If 3 hearts remaining AND got all answers correct, release the 100XP Bonus!
                if (this.lives === 3 && this.score === this.questions.length && isSuccess) {
                    perfectBonus = 100;
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }

                let totalXp = baseXp + perfectBonus;

                // Animated XP point counter increments
                let currentXp = 0;
                xpText.innerText = "0 XP";
                
                if (totalXp > 0) {
                    const stepDuration = Math.max(Math.floor(1000 / totalXp), 15);
                    const timer = setInterval(() => {
                        currentXp += 2;
                        if (currentXp >= totalXp) {
                            currentXp = totalXp;
                            clearInterval(timer);
                            if (perfectBonus > 0) {
                                triggerConfetti();
                                playSound('success');
                            }
                        }
                        xpText.innerText = `${currentXp} XP`;
                    }, stepDuration);
                }
            },

            updateResultsLanguage() {
                const strings = TRANSLATIONS[this.currentLanguage];
                const title = document.getElementById('results-title');
                const sub = document.getElementById('results-subtitle');
                const btnDashboard = document.querySelector('#screen-results button[onclick="gameEngine.goToDashboard()"]');
                
                // Labels
                const scoreLabel = document.getElementById('label-score');
                const heartsLabel = document.getElementById('label-hearts');
                const xpLabel = document.getElementById('label-xp');
                const badge = document.getElementById('perfect-badge');

                if (scoreLabel) scoreLabel.innerText = strings.score;
                if (heartsLabel) heartsLabel.innerText = strings.hearts;
                if (xpLabel) xpLabel.innerText = strings.xp;
                if (badge) badge.innerText = strings.perfectBonusBadge;

                if (btnDashboard) btnDashboard.innerText = strings.backToLessons;

                const isPass = this.score >= (this.questions.length / 2);
                if (isPass) {
                    title.innerText = strings.excellentJob;
                    sub.innerText = strings.completedRun;
                } else {
                    title.innerText = strings.terrificEffort;
                    sub.innerText = strings.practiceKey;
                }
            },

            async quitGame() {
                const strings = TRANSLATIONS[this.currentLanguage];
                const confirmed = await ui.confirm(
                    strings.leaveRunMsg,
                    strings.leaveRunTitle,
                    "🤔"
                );
                if (confirmed) {
                    this.goToDashboard();
                }
            }
        };

        window.onload = function() {
            gameEngine.init();
            resizeCanvas();
        };

    </script>
